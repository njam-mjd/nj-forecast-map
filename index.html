<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NJ Weather Forecast Map | NJ.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --nj-charcoal: #1B1B1B;
    --nj-dark: #222233;
    --nj-green: #84c341;
    --nj-orange: #FF6B35;
    --nj-red: #E8333A;
    --nj-white: #FFFFFF;
    --nj-gray: #8A8FA0;
    --nj-border: #2E2E42;
    --nj-card: #262638;
    --nj-map-bg: #CADAE8;
    --nj-map-land: #E8EDF3;
    --radius: 8px;
  }
  body {
    font-family: 'Libre Franklin', Arial, sans-serif;
    background: var(--nj-charcoal);
    color: var(--nj-white);
    line-height: 1.4;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .widget-container {
    max-width: 480px; margin: 0 auto;
    background: var(--nj-dark); min-height: 100dvh;
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: #555;
    border-bottom: 3px solid var(--nj-green);
  }
  .header-logo img { height: 32px; width: auto; display: block; }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .header-weather-icon { font-size: 16px; }
  .header-title {
    font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--nj-white); opacity: 0.85;
  }

  /* ALERTS */
  .alerts-banner {
    display: none; background: var(--nj-red);
    color: var(--nj-white); cursor: pointer;
  }
  .alerts-banner.active { display: block; }
  .alerts-banner-inner {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px; font-size: 12px; font-weight: 700; min-height: 36px;
  }
  .alert-icon { flex-shrink: 0; font-size: 14px; }
  .alert-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .alert-count {
    flex-shrink: 0; background: rgba(255,255,255,0.25);
    border-radius: 10px; padding: 2px 8px; font-size: 10px; font-weight: 800;
  }
  .alert-severity-watch { background: #B8860B; }
  .alert-severity-advisory { background: #5B7BA3; }
  .alerts-detail {
    display: none; background: #2a1a1a;
    max-height: 200px; overflow-y: auto; border-bottom: 2px solid var(--nj-red);
  }
  .alerts-detail.open { display: block; }
  .alert-item {
    padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 12px; line-height: 1.5;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item-title { font-weight: 700; color: var(--nj-orange); margin-bottom: 3px; }
  .alert-item-areas { color: var(--nj-gray); font-size: 11px; margin-bottom: 3px; }
  .alert-item-desc {
    color: #ccc; font-size: 11px;
    display: -webkit-box; -webkit-line-clamp: 3;
    -webkit-box-orient: vertical; overflow: hidden;
  }

  /* SEARCH BAR */
  .search-bar {
    padding: 8px 14px;
    background: rgba(0,0,0,0.25);
    position: relative;
  }
  .search-wrapper {
    position: relative;
  }
  .search-input {
    width: 100%; padding: 8px 12px 8px 32px;
    background: var(--nj-card); border: 1px solid var(--nj-border);
    border-radius: var(--radius); color: var(--nj-white);
    font-family: inherit; font-size: 13px; font-weight: 500;
    outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: #666E80; }
  .search-input:focus { border-color: var(--nj-green); }
  .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 14px; opacity: 0.4; pointer-events: none;
  }
  .search-results {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--nj-card); border: 1px solid var(--nj-border);
    border-top: none; border-radius: 0 0 var(--radius) var(--radius);
    max-height: 200px; overflow-y: auto; z-index: 20;
    display: none;
  }
  .search-results.open { display: block; }
  .search-result-item {
    padding: 8px 12px; font-size: 12px; font-weight: 500;
    cursor: pointer; transition: background 0.1s;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .search-result-item:hover, .search-result-item.highlighted {
    background: rgba(132,195,65,0.15); color: var(--nj-green);
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item mark {
    background: none; color: var(--nj-green); font-weight: 700;
  }

  /* UPDATE BAR */
  .update-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 14px; font-size: 10px; color: var(--nj-gray); background: rgba(0,0,0,0.15);
  }
  .update-bar button {
    background: none; border: 1px solid var(--nj-border); color: var(--nj-gray);
    font-family: inherit; font-size: 10px; padding: 2px 8px;
    border-radius: 4px; cursor: pointer; transition: all 0.2s;
  }
  .update-bar button:hover { border-color: var(--nj-green); color: var(--nj-green); }

  /* MAP */
  .map-section {
    position: relative; background: var(--nj-map-bg);
    padding: 6px 0; overflow: hidden;
  }
  .map-wrapper {
    position: relative; width: 100%; max-width: 340px; margin: 0 auto;
  }
  .map-wrapper svg { width: 100%; height: auto; display: block; }
  .marker-bg {
    fill: white; stroke: var(--nj-green); stroke-width: 1.5;
    transition: fill 0.15s;
  }
  .marker-temp {
    font-family: 'Libre Franklin', sans-serif; font-size: 12px; font-weight: 800;
    fill: var(--nj-charcoal); text-anchor: middle; pointer-events: none;
  }
  .marker-label-text {
    font-family: 'Libre Franklin', sans-serif; font-size: 7px; font-weight: 700;
    fill: var(--nj-charcoal); text-anchor: middle; pointer-events: none;
  }
  .marker-pin {
    fill: var(--nj-green); stroke: white; stroke-width: 1.5;
  }

  /* FORECAST PANEL */
  .forecast-panel { padding: 0 14px 14px; }
  .forecast-location-name {
    font-size: 16px; font-weight: 800; padding: 12px 0 2px;
    display: flex; align-items: center; gap: 6px;
  }
  .loc-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--nj-green); display: inline-block;
  }
  .forecast-current {
    font-size: 12px; color: var(--nj-gray);
    margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--nj-border);
  }
  .forecast-days { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .forecast-day-card {
    background: var(--nj-card); border-radius: var(--radius);
    padding: 10px 8px; text-align: center;
    border: 1px solid var(--nj-border);
  }
  .forecast-day-card:first-child { border-color: var(--nj-green); }
  .day-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; color: var(--nj-gray); margin-bottom: 6px;
  }
  .forecast-day-card:first-child .day-label { color: var(--nj-green); }
  .day-icon { font-size: 26px; margin-bottom: 4px; }
  .day-temps {
    display: flex; justify-content: center; align-items: baseline;
    gap: 4px; margin-bottom: 4px;
  }
  .day-high { font-size: 20px; font-weight: 800; color: var(--nj-white); }
  .day-low { font-size: 13px; font-weight: 600; color: var(--nj-gray); }
  .day-desc {
    font-size: 10px; color: var(--nj-gray); font-weight: 500; line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
  }
  .day-wind { font-size: 9px; color: #666E80; margin-top: 4px; font-weight: 500; }
  .forecast-empty {
    text-align: center; padding: 24px 14px;
    color: var(--nj-gray); font-size: 13px;
  }
  .forecast-empty .prompt-icon { font-size: 28px; margin-bottom: 6px; opacity: 0.5; }
  .loading-spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--nj-border); border-top-color: var(--nj-green);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay {
    position: absolute; inset: 0; background: rgba(202,218,232,0.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .loading-overlay.active { opacity: 1; pointer-events: auto; }
  .loading-overlay .loading-spinner { width: 24px; height: 24px; border-width: 3px; }
  .footer {
    padding: 10px 14px; font-size: 9px; color: #555;
    text-align: center; border-top: 1px solid var(--nj-border); line-height: 1.5;
  }
  .footer a { color: var(--nj-green); text-decoration: none; }
  @media (max-width: 380px) {
    .forecast-days { gap: 5px; }
    .forecast-day-card { padding: 8px 5px; }
    .day-high { font-size: 18px; }
    .day-icon { font-size: 22px; }
  }
</style>
</head>

// Projection constants (same as Python)
const PROJ = {"min_lon": -75.559446, "max_lon": -73.893979, "min_lat": 38.928519, "max_lat": 41.357423, "cos_lat": 0.7644381024986509, "scale": 214.08832955110654, "off_x": 33.71710341533861, "off_y": 20.0};

function projectToSVG(lon, lat) {
  const x = (lon - PROJ.min_lon) * PROJ.cos_lat * PROJ.scale + PROJ.off_x;
  const y = (PROJ.max_lat - lat) * PROJ.scale + PROJ.off_y;
  return [Math.round(x*10)/10, Math.round(y*10)/10];

// ── SEARCH ──
function setupSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    highlightedIndex = -1;
    if (q.length < 1) { results.classList.remove('open'); return; }
    const matches = TOWNS.filter(t => t.name.toLowerCase().includes(q)).slice(0, 12);
    if (!matches.length) { results.classList.remove('open'); return; }
    results.innerHTML = matches.map((t, i) => {
      const idx = t.name.toLowerCase().indexOf(q);
      const highlighted = t.name.substring(0, idx) + '<mark>' + t.name.substring(idx, idx + q.length) + '</mark>' + t.name.substring(idx + q.length);
      return '<div class="search-result-item" data-index="' + i + '" onclick="selectTownByName(\'' + t.name.replace(/'/g, "\\'") + '\')">' + highlighted + '</div>';
    }).join('');
    results.classList.add('open');
  });

  input.addEventListener('keydown', (e) => {
    const items = results.querySelectorAll('.search-result-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
      items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
      items[highlightedIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightedIndex = Math.max(highlightedIndex - 1, 0);
      items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
      items[highlightedIndex].scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter' && highlightedIndex >= 0) {
      e.preventDefault();
      items[highlightedIndex].click();
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) results.classList.remove('open');
  });
}

function selectTownByName(name) {
  const town = TOWNS.find(t => t.name === name);
  if (town) selectTown(town);
}

function selectTown(town) {
  selectedTown = town;
  document.getElementById('searchInput').value = town.name;
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('forecastEmpty').style.display = 'none';
  document.getElementById('forecastContent').style.display = 'block';
  document.getElementById('forecastLocName').textContent = town.name;

  // Place marker on map
  placeMarker(town);

  // Fetch forecast
  const cacheKey = town.lat + ',' + town.lon;
  if (forecastCache[cacheKey]) {
    renderForecast(forecastCache[cacheKey]);
  } else {
    document.getElementById('forecastCurrent').innerHTML = '<span class="loading-spinner"></span> Loading forecast...';
    document.getElementById('forecastDays').innerHTML = '';
    fetchForecastFor(town);
  }
}

function placeMarker(town) {
  const [mx, my] = projectToSVG(town.lon, town.lat);
  const g = document.getElementById('markerGroup');
  g.innerHTML = '';

  // Pin drop shadow
  const shadow = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  shadow.setAttribute('cx', mx);
  shadow.setAttribute('cy', my + 14);
  shadow.setAttribute('rx', '6');
  shadow.setAttribute('ry', '2');
  shadow.setAttribute('fill', 'rgba(0,0,0,0.2)');
  g.appendChild(shadow);

  // Pin shape
  const pin = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  pin.setAttribute('d', 'M' + mx + ',' + (my + 10) + ' C' + (mx-4) + ',' + (my+2) + ' ' + (mx-8) + ',' + (my-4) + ' ' + (mx-8) + ',' + (my-8) +
    ' A8,8 0 1,1 ' + (mx+8) + ',' + (my-8) +
    ' C' + (mx+8) + ',' + (my-4) + ' ' + (mx+4) + ',' + (my+2) + ' ' + mx + ',' + (my+10) + 'Z');
  pin.classList.add('marker-pin');
  g.appendChild(pin);

  // White dot
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('cx', mx);
  dot.setAttribute('cy', my - 8);
  dot.setAttribute('r', '3');
  dot.setAttribute('fill', 'white');
  g.appendChild(dot);

  // Label
  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.classList.add('marker-label-text');
  label.setAttribute('x', mx);
  label.setAttribute('y', my + 24);
  label.textContent = town.name;
  g.appendChild(label);
}

// ── MAP CLICK: find nearest town ──
function setupMapClick() {
  const svg = document.getElementById('njMap');
  const outline = document.getElementById('njOutline');

  svg.addEventListener('click', (e) => {
    if (e.target.closest('.search-wrapper')) return;
    const rect = svg.getBoundingClientRect();
    const svgX = (e.clientX - rect.left) / rect.width * 340;
    const svgY = (e.clientY - rect.top) / rect.height * 560;

    // Convert SVG coords back to lon/lat
    const lon = (svgX - PROJ.off_x) / (PROJ.cos_lat * PROJ.scale) + PROJ.min_lon;
    const lat = PROJ.max_lat - (svgY - PROJ.off_y) / PROJ.scale;

    // Find nearest town
    let nearest = null, minDist = Infinity;
    TOWNS.forEach(t => {
      const d = Math.pow(t.lat - lat, 2) + Math.pow((t.lon - lon) * PROJ.cos_lat, 2);
      if (d < minDist) { minDist = d; nearest = t; }
    });
    if (nearest) selectTown(nearest);
  });
}

// ── FORECAST ──
async function fetchForecastFor(town) {
  try {
    const hdr = { 'User-Agent': 'NJcom-Weather/1.0 (news@njadvancemedia.com)', 'Accept': 'application/geo+json' };
    const ptRes = await fetch('https://api.weather.gov/points/' + town.lat + ',' + town.lon, { headers: hdr });
    if (!ptRes.ok) throw new Error('Point API ' + ptRes.status);
    const ptData = await ptRes.json();
    const fcRes = await fetch(ptData.properties.forecast, { headers: hdr });
    if (!fcRes.ok) throw new Error('Forecast API ' + fcRes.status);
    const fcData = await fcRes.json();
    const periods = fcData.properties.periods;
    const days = []; let i = 0, dc = 0;
    while (i < periods.length && dc < 3) {
      const p = periods[i];
      if (p.isDaytime) {
        const n = periods[i+1];
        days.push({ name: p.name, high: p.temperature, low: n ? n.temperature : null,
          shortForecast: p.shortForecast, windSpeed: p.windSpeed, windDirection: p.windDirection });
        dc++; i += 2;
      } else {
        if (dc === 0) {
          days.push({ name: p.name, high: null, low: p.temperature,
            shortForecast: p.shortForecast, windSpeed: p.windSpeed, windDirection: p.windDirection });
          dc++;
        }
        i++;
      }
    }
    const result = { periods, days };
    forecastCache[town.lat + ',' + town.lon] = result;
    if (selectedTown && selectedTown.name === town.name) {
      renderForecast(result);
      document.getElementById('updateTime').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    }
  } catch (err) {
    console.error('Forecast error ' + town.name, err);
    if (selectedTown && selectedTown.name === town.name)
      document.getElementById('forecastCurrent').textContent = 'Unable to load forecast. Try refreshing.';
  }
}

function getWeatherEmoji(s) {
  s = (s || '').toLowerCase();
  if (s.includes('thunder') || s.includes('tstorm')) return '⛈️';
  if (s.includes('snow') || s.includes('blizzard')) return '🌨️';
  if (s.includes('ice') || s.includes('sleet') || s.includes('freezing')) return '🧊';
  if (s.includes('rain') && !s.includes('chance')) return '🌧️';
  if (s.includes('showers') || s.includes('drizzle')) return '🌦️';
  if ((s.includes('chance') || s.includes('slight')) && (s.includes('rain') || s.includes('showers'))) return '🌦️';
  if (s.includes('fog') || s.includes('haze') || s.includes('mist')) return '🌫️';
  if (s.includes('overcast') || s.includes('cloud')) return '☁️';
  if (s.includes('partly') || s.includes('mostly sunny')) return '⛅';
  if (s.includes('sunny') || s.includes('clear')) return '☀️';
  if (s.includes('wind')) return '💨';
  return '🌤️';
}

function renderForecast(data) {
  const { days, periods } = data;
  if (!days || !days.length) { document.getElementById('forecastCurrent').textContent = 'No data available.'; return; }
  const f = periods[0], em = getWeatherEmoji(f.shortForecast);
  document.getElementById('forecastCurrent').innerHTML =
    em + ' Now: ' + f.shortForecast + ' &middot; ' + f.temperature + '&deg;' + f.temperatureUnit + ' &middot; Wind ' + f.windSpeed + ' ' + f.windDirection;
  const c = document.getElementById('forecastDays'); c.innerHTML = '';
  days.forEach((d, idx) => {
    const emoji = getWeatherEmoji(d.shortForecast);
    const card = document.createElement('div');
    card.className = 'forecast-day-card';
    const hs = d.high !== null ? d.high + '&deg;' : '--';
    const ls = d.low !== null ? d.low + '&deg;' : '--';
    const lbl = idx === 0 ? (d.name.toLowerCase().includes('tonight') ? 'TONIGHT' : 'TODAY')
      : (d.name.length > 9 ? d.name.substring(0,9) : d.name);
    card.innerHTML = '<div class="day-label">' + lbl + '</div>'
      + '<div class="day-icon">' + emoji + '</div>'
      + '<div class="day-temps"><span class="day-high">' + hs + '</span>'
      + '<span class="day-low">' + (d.high !== null && d.low !== null ? '/ ' + ls : (d.low !== null ? ls : '')) + '</span></div>'
      + '<div class="day-desc">' + d.shortForecast + '</div>'
      + '<div class="day-wind">' + d.windSpeed + ' ' + d.windDirection + '</div>';
    c.appendChild(card);
  });
}

// ── ALERTS ──
async function fetchAlerts() {
  try {
    const res = await fetch('https://api.weather.gov/alerts/active?area=NJ', {
      headers: { 'User-Agent': 'NJcom-Weather/1.0 (news@njadvancemedia.com)', 'Accept': 'application/geo+json' }
    });
    if (!res.ok) throw new Error('Alerts API ' + res.status);
    const data = await res.json();
    const alerts = (data.features || []).map(f => f.properties);
    if (!alerts.length) { document.getElementById('alertsBanner').classList.remove('active'); return; }
    const banner = document.getElementById('alertsBanner');
    banner.classList.add('active');
    const hasSevere = alerts.some(a => ['Extreme','Severe'].includes(a.severity));
    const hasWarning = alerts.some(a => a.event && a.event.toLowerCase().includes('warning'));
    const hasWatch = alerts.some(a => a.event && a.event.toLowerCase().includes('watch'));
    banner.className = 'alerts-banner active';
    if (!hasSevere && !hasWarning) {
      if (hasWatch) banner.classList.add('alert-severity-watch');
      else banner.classList.add('alert-severity-advisory');
    }
    document.getElementById('alertText').textContent = alerts[0].event || 'Weather Alert';
    document.getElementById('alertCount').textContent = alerts.length > 1 ? alerts.length + ' alerts' : '1 alert';
    document.getElementById('alertsDetail').innerHTML = alerts.map(a =>
      '<div class="alert-item"><div class="alert-item-title">⚠ ' + (a.event||'Alert') + '</div>'
      + '<div class="alert-item-areas">' + (a.areaDesc||'') + '</div>'
      + '<div class="alert-item-desc">' + (a.description ? a.description.substring(0,280) + (a.description.length>280?'...':'') : '') + '</div></div>'
    ).join('');
  } catch (err) { console.error('Alerts error:', err); }
}

function toggleAlerts() { document.getElementById('alertsDetail').classList.toggle('open'); }

function refreshForecast() {
  if (selectedTown) {
    const key = selectedTown.lat + ',' + selectedTown.lon;
    delete forecastCache[key];
    document.getElementById('forecastCurrent').innerHTML = '<span class="loading-spinner"></span> Refreshing...';
    document.getElementById('forecastDays').innerHTML = '';
    fetchForecastFor(selectedTown);
  }
  fetchAlerts();
}
