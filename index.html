<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NJ Weather Forecast Map | NJ.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { margin:0; padding:0; width:100%; overflow-x:hidden; }
  :root {
    --nj-charcoal:#1B1B1B; --nj-dark:#222233; --nj-green:#84c341;
    --nj-orange:#FF6B35; --nj-red:#E8333A; --nj-white:#FFFFFF;
    --nj-gray:#8A8FA0; --nj-border:#2E2E42; --nj-card:#262638;
    --radius:8px;
  }
  body {
    font-family:'Libre Franklin',Arial,sans-serif;
    background:var(--nj-charcoal); color:var(--nj-white);
    line-height:1.4; -webkit-font-smoothing:antialiased;
  }
  .widget-container {
    width:100%; margin:0;
    background:var(--nj-dark); min-height:100dvh;
    display:flex; flex-direction:column;
  }

  /* HEADER */
  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:#555;
    border-bottom:3px solid var(--nj-green);
  }
  .header-logo img { height:32px; width:auto; display:block; }
  .header-right { display:flex; align-items:center; gap:6px; }
  .header-title {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:1.2px; color:var(--nj-white); opacity:0.85;
  }

  /* ALERTS */
  .alerts-banner {
    display:none; background:var(--nj-red);
    color:var(--nj-white); cursor:pointer;
  }
  .alerts-banner.active { display:block; }
  .alerts-banner-inner {
    display:flex; align-items:center; gap:8px;
    padding:8px 14px; font-size:12px; font-weight:700; min-height:36px;
  }
  .alert-icon { flex-shrink:0; font-size:14px; }
  .alert-text { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .alert-count {
    flex-shrink:0; background:rgba(255,255,255,0.25);
    border-radius:10px; padding:2px 8px; font-size:10px; font-weight:800;
  }
  .alert-severity-watch { background:#B8860B; }
  .alert-severity-advisory { background:#5B7BA3; }
  .alerts-detail {
    display:none; background:#2a1a1a;
    max-height:200px; overflow-y:auto; border-bottom:2px solid var(--nj-red);
  }
  .alerts-detail.open { display:block; }
  .alert-item {
    padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.08);
    font-size:12px; line-height:1.5;
  }
  .alert-item:last-child { border-bottom:none; }
  .alert-item-title { font-weight:700; color:var(--nj-orange); margin-bottom:3px; }
  .alert-item-areas { color:var(--nj-gray); font-size:11px; margin-bottom:3px; }
  .alert-item-desc {
    color:#ccc; font-size:11px;
    display:-webkit-box; -webkit-line-clamp:3;
    -webkit-box-orient:vertical; overflow:hidden;
  }

  /* SEARCH */
  .search-bar { padding:8px 14px; background:rgba(0,0,0,0.25); position:relative; }
  .search-wrapper { position:relative; }
  .search-input {
    width:100%; padding:8px 12px 8px 32px;
    background:var(--nj-card); border:1px solid var(--nj-border);
    border-radius:var(--radius); color:var(--nj-white);
    font-family:inherit; font-size:13px; font-weight:500; outline:none;
    transition:border-color 0.2s;
  }
  .search-input::placeholder { color:#666E80; }
  .search-input:focus { border-color:var(--nj-green); }
  .search-icon {
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    font-size:14px; opacity:0.4; pointer-events:none;
  }
  .search-results {
    position:absolute; top:100%; left:0; right:0;
    background:var(--nj-card); border:1px solid var(--nj-border);
    border-top:none; border-radius:0 0 var(--radius) var(--radius);
    max-height:200px; overflow-y:auto; z-index:1000; display:none;
  }
  .search-results.open { display:block; }
  .search-result-item {
    padding:8px 12px; font-size:12px; font-weight:500;
    cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .search-result-item:hover,.search-result-item.highlighted {
    background:rgba(132,195,65,0.15); color:var(--nj-green);
  }
  .search-result-item mark { background:none; color:var(--nj-green); font-weight:700; }

  /* FORECAST PANEL - above map */
  .forecast-panel {
    padding:0 14px;
    transition:max-height 0.3s ease;
    overflow:hidden;
  }
  .forecast-panel.collapsed { display:none; }
  .forecast-location-name {
    font-size:15px; font-weight:800; padding:10px 0 2px;
    display:flex; align-items:center; gap:6px;
  }
  .loc-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--nj-green); display:inline-block;
  }
  .forecast-current {
    font-size:12px; color:var(--nj-gray);
    margin-bottom:8px; padding-bottom:8px;
    border-bottom:1px solid var(--nj-border);
  }
  .forecast-days { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding-bottom:10px; }
  .forecast-day-card {
    background:var(--nj-card); border-radius:var(--radius);
    padding:10px 8px; text-align:center;
    border:1px solid var(--nj-border);
  }
  .forecast-day-card:first-child { border-color:var(--nj-green); }
  .day-label {
    font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:0.8px; color:var(--nj-gray); margin-bottom:6px;
  }
  .forecast-day-card:first-child .day-label { color:var(--nj-green); }
  .day-icon { font-size:26px; margin-bottom:4px; }
  .day-temps { display:flex; justify-content:center; align-items:baseline; gap:4px; margin-bottom:4px; }
  .day-high { font-size:20px; font-weight:800; color:var(--nj-white); }
  .day-low { font-size:13px; font-weight:600; color:var(--nj-gray); }
  .day-desc {
    font-size:10px; color:var(--nj-gray); font-weight:500; line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2;
    -webkit-box-orient:vertical; overflow:hidden;
  }
  .day-wind { font-size:9px; color:#666E80; margin-top:4px; font-weight:500; }

  /* HOURLY SECTION */
  .hourly-toggle {
    display:flex; align-items:center; justify-content:center; gap:4px;
    padding:6px 0 10px; cursor:pointer; font-size:11px; font-weight:600;
    color:var(--nj-green); transition:opacity 0.2s;
  }
  .hourly-toggle:hover { opacity:0.8; }
  .hourly-toggle .arrow { transition:transform 0.2s; display:inline-block; font-size:9px; }
  .hourly-toggle.open .arrow { transform:rotate(180deg); }
  .hourly-section { display:none; padding-bottom:10px; }
  .hourly-section.open { display:block; }
  .hourly-row {
    display:flex; align-items:center; gap:6px;
    padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04);
    font-size:11px;
  }
  .hourly-row:last-child { border-bottom:none; }
  .hourly-time { min-width:58px; color:var(--nj-gray); font-weight:500; font-variant-numeric:tabular-nums; }
  .hourly-emoji { min-width:20px; text-align:center; }
  .hourly-temp { min-width:36px; font-weight:700; }
  .hourly-desc { flex:1; color:var(--nj-gray); font-size:10px; }
  .hourly-wind { color:#555; font-size:9px; min-width:64px; text-align:right; }

  /* ERROR/RETRY */
  .forecast-error {
    padding:12px; text-align:center; font-size:12px; color:var(--nj-gray);
  }
  .forecast-error .retry-btn {
    display:inline-block; margin-top:6px; padding:4px 14px;
    background:var(--nj-green); color:var(--nj-charcoal); border:none;
    border-radius:4px; font-family:inherit; font-size:11px; font-weight:700;
    cursor:pointer;
  }
  .loading-spinner {
    display:inline-block; width:14px; height:14px;
    border:2px solid var(--nj-border); border-top-color:var(--nj-green);
    border-radius:50%; animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* MAP */
  #map {
    flex:1; min-height:580px; z-index:1; width:100%;
  }
  .leaflet-container { background:#f2efe9 !important; }
  /* County label styling */
  .county-label {
    font-family:'Libre Franklin',sans-serif !important;
    font-size:8px !important; font-weight:600 !important;
    color:#3D5A73 !important; text-transform:capitalize;
    letter-spacing:0.3px;
    background:none !important; border:none !important;
    box-shadow:none !important; white-space:nowrap;
    pointer-events:none !important;
  }
  /* Custom marker */
  .town-marker {
    background:var(--nj-green); border:2.5px solid white;
    border-radius:50%; width:14px; height:14px;
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
  }

  /* FOOTER */
  .footer {
    padding:10px 14px; font-size:9px; color:#555;
    text-align:center; border-top:1px solid var(--nj-border); line-height:1.5;
  }
  .footer a { color:var(--nj-green); text-decoration:none; }
  @media (max-width:380px) {
    .forecast-days { gap:5px; }
    .forecast-day-card { padding:8px 5px; }
    .day-high { font-size:18px; }
    .day-icon { font-size:22px; }
  }
</style>
</head>

// ── SEARCH ──
function setupSearch() {
  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    highlightedIndex = -1;
    if (q.length < 1) { results.classList.remove('open'); return; }
    const matches = TOWNS.filter(t => t.name.toLowerCase().includes(q)).slice(0, 12);
    if (!matches.length) { results.classList.remove('open'); return; }
    results.innerHTML = matches.map((t, i) => {
      const idx = t.name.toLowerCase().indexOf(q);
      const hl = t.name.substring(0,idx) + '<mark>' + t.name.substring(idx, idx+q.length) + '</mark>' + t.name.substring(idx+q.length);
      return '<div class="search-result-item" data-index="'+i+'" data-name="'+t.name.replace(/"/g,'&quot;')+'">'+hl+'</div>';
    }).join('');
    results.querySelectorAll('.search-result-item').forEach(el => {
      el.addEventListener('click', () => selectTownByName(el.dataset.name));
    });
    results.classList.add('open');
  });

  input.addEventListener('keydown', (e) => {
    const items = results.querySelectorAll('.search-result-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      highlightedIndex = Math.min(highlightedIndex+1, items.length-1);
      items.forEach((el,i) => el.classList.toggle('highlighted', i===highlightedIndex));
      items[highlightedIndex].scrollIntoView({block:'nearest'});
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      highlightedIndex = Math.max(highlightedIndex-1, 0);
      items.forEach((el,i) => el.classList.toggle('highlighted', i===highlightedIndex));
      items[highlightedIndex].scrollIntoView({block:'nearest'});
    } else if (e.key === 'Enter' && highlightedIndex >= 0) {
      e.preventDefault();
      items[highlightedIndex].click();
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrapper')) results.classList.remove('open');
  });
}

function selectTownByName(name) {
  const town = TOWNS.find(t => t.name === name);
  if (town) selectTown(town);
}

// ── SELECT TOWN (from search) ──
function selectTown(town) {
  selectedTown = { name: town.name, lat: town.lat, lon: town.lon };
  document.getElementById('searchInput').value = town.name;
  document.getElementById('searchResults').classList.remove('open');
  showForecastPanel(town.name);
  placeMarker(town.lat, town.lon);
  loadForecast(town.lat, town.lon, town.name);
}

// ── SELECT BY COORDS (from map click, uses NWS relativeLocation) ──
async function selectByCoords(lat, lon) {
  const myReq = ++requestId;
  showForecastPanel('Loading...');
  placeMarker(lat, lon);
  document.getElementById('forecastCurrent').innerHTML = '<span class="loading-spinner"></span> Locating...';
  document.getElementById('forecastDays').innerHTML = '';
  hideHourly();

  try {
    const ptRes = await fetch('https://api.weather.gov/points/'+lat.toFixed(4)+','+lon.toFixed(4));
    if (myReq !== requestId) return;
    if (!ptRes.ok) throw new Error('NWS returned '+ptRes.status);
    const ptData = await ptRes.json();
    const props = ptData.properties || {};
    const rel = props.relativeLocation?.properties;
    const locName = rel ? rel.city + ', ' + rel.state : 'Selected Location';

    selectedTown = { name: locName, lat, lon };
    document.getElementById('forecastLocName').textContent = locName;
    document.getElementById('searchInput').value = rel ? rel.city : '';

    await fetchForecasts(props.forecast, props.forecastHourly, lat, lon, locName, myReq);
  } catch(err) {
    if (myReq !== requestId) return;
    showError('Could not load forecast for this location. NWS may be temporarily unavailable.', lat, lon);
  }
}

function showForecastPanel(name) {
  const panel = document.getElementById('forecastPanel');
  panel.classList.remove('collapsed');
  document.getElementById('forecastLocName').textContent = name;
  setTimeout(() => map.invalidateSize(), 350);
}

function placeMarker(lat, lon) {
  if (currentMarker) map.removeLayer(currentMarker);
  currentMarker = L.marker([lat, lon], {
    icon: L.divIcon({ className: 'town-marker', iconSize: [14, 14], iconAnchor: [7, 7] })
  }).addTo(map);
}

function hideHourly() {
  document.getElementById('hourlyToggle').style.display = 'none';
  document.getElementById('hourlySection').innerHTML = '';
  document.getElementById('hourlySection').classList.remove('open');
  const toggle = document.getElementById('hourlyToggle');
  toggle.classList.remove('open');
  toggle.innerHTML = 'Show hourly forecast <span class="arrow">▼</span>';
}

// ── LOAD FORECAST (from search, needs points lookup first) ──
async function loadForecast(lat, lon, name) {
  const myReq = ++requestId;
  const key = lat+','+lon;
  if (forecastCache[key]) {
    renderForecast(forecastCache[key]);
    return;
  }

  document.getElementById('forecastCurrent').innerHTML = '<span class="loading-spinner"></span> Loading forecast...';
  document.getElementById('forecastDays').innerHTML = '';
  hideHourly();

  try {
    const ptRes = await fetch('https://api.weather.gov/points/'+lat+','+lon);
    if (myReq !== requestId) return;
    if (!ptRes.ok) throw new Error('NWS returned '+ptRes.status);
    const ptData = await ptRes.json();
    const props = ptData.properties || {};
    await fetchForecasts(props.forecast, props.forecastHourly, lat, lon, name, myReq);
  } catch(err) {
    if (myReq !== requestId) return;
    showError('Could not load forecast. NWS may be temporarily unavailable.', lat, lon, name);
  }
}

// ── FETCH BOTH FORECASTS ──
async function fetchForecasts(forecastUrl, hourlyUrl, lat, lon, name, myReq) {
  if (!forecastUrl) throw new Error('No forecast URL from NWS');

  // Fetch daily and hourly in parallel
  const [fcRes, hrRes] = await Promise.all([
    fetch(forecastUrl),
    hourlyUrl ? fetch(hourlyUrl).catch(() => null) : Promise.resolve(null)
  ]);

  if (myReq !== requestId) return;
  if (!fcRes.ok) throw new Error('Forecast API '+fcRes.status);

  const fcData = await fcRes.json();
  const periods = fcData.properties.periods;

  // Parse 3-day
  const days = []; let i=0, dc=0;
  while (i < periods.length && dc < 3) {
    const p = periods[i];
    if (p.isDaytime) {
      const n = periods[i+1];
      days.push({ name:p.name, high:p.temperature, low:n?n.temperature:null,
        shortForecast:p.shortForecast, windSpeed:p.windSpeed, windDirection:p.windDirection });
      dc++; i+=2;
    } else {
      if (dc===0) {
        days.push({ name:p.name, high:null, low:p.temperature,
          shortForecast:p.shortForecast, windSpeed:p.windSpeed, windDirection:p.windDirection });
        dc++;
      }
      i++;
    }
  }

  // Parse hourly
  let hourlyPeriods = [];
  if (hrRes && hrRes.ok) {
    try {
      const hrData = await hrRes.json();
      hourlyPeriods = (hrData.properties?.periods || []).slice(0, 12);
    } catch(e) { /* hourly is optional */ }
  }

  const result = { periods, days, hourlyPeriods };
  forecastCache[lat+','+lon] = result;

  if (myReq === requestId) renderForecast(result);
}

// ── ERROR DISPLAY WITH RETRY ──
function showError(msg, lat, lon, name) {
  document.getElementById('forecastCurrent').innerHTML = '';
  document.getElementById('forecastDays').innerHTML =
    '<div class="forecast-error" style="grid-column:1/-1;">'
    + msg
    + '<br><button class="retry-btn" onclick="retryForecast()">↻ Retry</button>'
    + '</div>';
  hideHourly();
  // Store for retry
  selectedTown = { name: name || 'Location', lat, lon };
}

function retryForecast() {
  if (selectedTown) loadForecast(selectedTown.lat, selectedTown.lon, selectedTown.name);
}

function getWeatherEmoji(s) {
  s = (s||'').toLowerCase();
  if (s.includes('thunder')||s.includes('tstorm')) return '⛈️';
  if (s.includes('snow')||s.includes('blizzard')) return '🌨️';
  if (s.includes('ice')||s.includes('sleet')||s.includes('freezing')) return '🧊';
  if (s.includes('rain')&&!s.includes('chance')) return '🌧️';
  if (s.includes('showers')||s.includes('drizzle')) return '🌦️';
  if ((s.includes('chance')||s.includes('slight'))&&(s.includes('rain')||s.includes('showers'))) return '🌦️';
  if (s.includes('fog')||s.includes('haze')||s.includes('mist')) return '🌫️';
  if (s.includes('overcast')||s.includes('cloud')) return '☁️';
  if (s.includes('partly')||s.includes('mostly sunny')) return '⛅';
  if (s.includes('sunny')||s.includes('clear')) return '☀️';
  if (s.includes('wind')) return '💨';
  return '🌤️';
}

function renderForecast(data) {
  const {days, periods, hourlyPeriods} = data;
  if (!days||!days.length) { document.getElementById('forecastCurrent').textContent='No data available.'; return; }
  const f=periods[0], em=getWeatherEmoji(f.shortForecast);
  document.getElementById('forecastCurrent').innerHTML =
    em+' Now: '+f.shortForecast+' &middot; '+f.temperature+'&deg;'+f.temperatureUnit+' &middot; Wind '+f.windSpeed+' '+f.windDirection;
  const c = document.getElementById('forecastDays'); c.innerHTML='';
  days.forEach((d,idx) => {
    const emoji = getWeatherEmoji(d.shortForecast);
    const card = document.createElement('div');
    card.className = 'forecast-day-card';
    const hs = d.high!==null ? d.high+'&deg;' : '--';
    const ls = d.low!==null ? d.low+'&deg;' : '--';
    const lbl = idx===0 ? (d.name.toLowerCase().includes('tonight')?'TONIGHT':'TODAY')
      : (d.name.length>9 ? d.name.substring(0,9) : d.name);
    card.innerHTML = '<div class="day-label">'+lbl+'</div>'
      +'<div class="day-icon">'+emoji+'</div>'
      +'<div class="day-temps"><span class="day-high">'+hs+'</span>'
      +'<span class="day-low">'+(d.high!==null&&d.low!==null?'/ '+ls:(d.low!==null?ls:''))+'</span></div>'
      +'<div class="day-desc">'+d.shortForecast+'</div>'
      +'<div class="day-wind">'+d.windSpeed+' '+d.windDirection+'</div>';
    c.appendChild(card);
  });

  // Hourly section
  const toggle = document.getElementById('hourlyToggle');
  const section = document.getElementById('hourlySection');
  if (hourlyPeriods && hourlyPeriods.length) {
    toggle.style.display = 'flex';
    toggle.classList.remove('open');
    toggle.innerHTML = 'Show hourly forecast <span class="arrow">▼</span>';
    section.classList.remove('open');
    section.innerHTML = hourlyPeriods.map(p => {
      const time = p.startTime ? new Date(p.startTime).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'}) : '';
      const temp = p.temperature != null ? p.temperature+'°' : '—';
      const emoji = getWeatherEmoji(p.shortForecast);
      const wind = [p.windSpeed, p.windDirection].filter(Boolean).join(' ');
      return '<div class="hourly-row">'
        +'<span class="hourly-time">'+time+'</span>'
        +'<span class="hourly-emoji">'+emoji+'</span>'
        +'<span class="hourly-temp">'+temp+'</span>'
        +'<span class="hourly-desc">'+(p.shortForecast||'')+'</span>'
        +'<span class="hourly-wind">'+wind+'</span>'
        +'</div>';
    }).join('');
  } else {
    toggle.style.display = 'none';
    section.innerHTML = '';
  }

  // Re-invalidate map after forecast renders
  setTimeout(() => map.invalidateSize(), 100);
}

function toggleHourly() {
  const toggle = document.getElementById('hourlyToggle');
  const section = document.getElementById('hourlySection');
  const isOpen = section.classList.toggle('open');
  toggle.classList.toggle('open');
  toggle.innerHTML = (isOpen ? 'Hide hourly forecast' : 'Show hourly forecast') + ' <span class="arrow">▼</span>';
  setTimeout(() => map.invalidateSize(), 100);
}

// ── ALERTS ──
async function fetchAlerts() {
  try {
    const res = await fetch('https://api.weather.gov/alerts/active?area=NJ');
    if (!res.ok) throw new Error('Alerts API '+res.status);
    const data = await res.json();
    const alerts = (data.features||[]).map(f=>f.properties);
    if (!alerts.length) { document.getElementById('alertsBanner').classList.remove('active'); return; }
    const banner = document.getElementById('alertsBanner');
    banner.classList.add('active');
    const hasSevere = alerts.some(a=>['Extreme','Severe'].includes(a.severity));
    const hasWarning = alerts.some(a=>a.event&&a.event.toLowerCase().includes('warning'));
    const hasWatch = alerts.some(a=>a.event&&a.event.toLowerCase().includes('watch'));
    banner.className = 'alerts-banner active';
    if (!hasSevere&&!hasWarning) {
      if (hasWatch) banner.classList.add('alert-severity-watch');
      else banner.classList.add('alert-severity-advisory');
    }
    document.getElementById('alertText').textContent = alerts[0].event||'Weather Alert';
    document.getElementById('alertCount').textContent = alerts.length>1?alerts.length+' alerts':'1 alert';
    document.getElementById('alertsDetail').innerHTML = alerts.map(a=>
      '<div class="alert-item"><div class="alert-item-title">⚠ '+(a.event||'Alert')+'</div>'
      +'<div class="alert-item-areas">'+(a.areaDesc||'')+'</div>'
      +'<div class="alert-item-desc">'+(a.description?a.description.substring(0,280)+(a.description.length>280?'...':''):'')+'</div></div>'
    ).join('');
  } catch(err) { console.error('Alerts error:',err); }
}

function toggleAlerts() { document.getElementById('alertsDetail').classList.toggle('open'); }
